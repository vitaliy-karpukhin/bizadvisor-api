services:
  - type: web
    name: bizadvisor-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: DATABASE_URL
        fromDatabase:
          name: bizadvisor-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # задаётся вручную после деплоя фронтенда
      - key: OPENAI_API_KEY
        sync: false   # задаётся вручную

databases:
  - name: bizadvisor-db
    databaseName: bizadvisor
    plan: free
